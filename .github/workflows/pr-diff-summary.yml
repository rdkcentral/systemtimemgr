name: AI PR Description Generator

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  generate-description:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Collect diff
        run: |
          git diff origin/${{ github.base_ref }} > diff.txt

      - name: Extract PR title
        id: title
        run: |
          echo "TITLE=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT

      - name: Generate AI description
        id: ai
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('diff.txt','utf8').slice(0,12000);
            const title = "${{ steps.title.outputs.TITLE }}";

            const prompt = `
            PR Title: ${title}

            Below is the git diff for a pull request.

            Generate a professional PR description with:
            - Summary
            - Key Changes
            - Modules Impacted
            - Testing Notes

            Diff:
            ${diff}
            `;

            const response = await github.request("POST /ai/generate", {
              model: "gpt-4.1",
              prompt: prompt
            });

            return response.data.output;

      - name: Update PR description
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ steps.ai.outputs.result }}`;

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: body
            });
